<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel — Javier Pino</title>
</head>
<body>
  <script>
    window.CMS_MANUAL_INIT = true;
  </script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'hugojavierpino/javierpino',
          branch: 'main',
          base_url: 'https://javierpino-auth.hugojavier95.workers.dev',
          auth_endpoint: '/auth'
        },
        media_folder: 'public/images',
        public_folder: '/images',
        collections: [
          {
            name: 'articulos',
            label: 'Artículos',
            folder: 'src/content/articulos',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Título', name: 'title', widget: 'string' },
              { label: 'Fecha', name: 'date', widget: 'datetime' },
              { label: 'Categoría', name: 'categoria', widget: 'select', options: ['Teología Sistemática', 'Predicación', 'Vida Cristiana', 'Historia de la Iglesia'] },
              { label: 'Resumen', name: 'resumen', widget: 'text' },
              { label: 'Contenido', name: 'body', widget: 'markdown' }
            ]
          },
          {
            name: 'sermones',
            label: 'Sermones',
            folder: 'src/content/sermones',
            create: true,
            slug: '{{slug}}',
            fields: [
              { label: 'Título', name: 'title', widget: 'string' },
              { label: 'Fecha', name: 'date', widget: 'datetime' },
              { label: 'Pasaje Bíblico', name: 'pasaje', widget: 'string' },
              { label: 'URL YouTube', name: 'youtube', widget: 'string', required: false },
              { label: 'Contenido', name: 'body', widget: 'markdown' }
            ]
          }
        ]
      }
    });
  </script>
</body>
</html>
